# Configuração Nginx para In'Nova Envios
# Serve o frontend web na porta 8081 e faz proxy da API para porta 3002

upstream innova_api {
    server 127.0.0.1:3002;
}

upstream innova_web {
    server 127.0.0.1:8081;
}

server {
    listen 80;
    listen [::]:80;
    server_name innovaenvios.app www.innovaenvios.app;

    # Redirecionar HTTP para HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name innovaenvios.app www.innovaenvios.app;

    # Certificados SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/innovaenvios.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/innovaenvios.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logs
    access_log /var/log/nginx/innovaenvios.app.access.log;
    error_log /var/log/nginx/innovaenvios.app.error.log;

    # Tamanho máximo de upload
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript;
    gzip_min_length 1000;

    # ===== FRONTEND WEB (Expo Metro) =====
    # Servir tudo que não seja /api/ do Metro bundler na porta 8081
    location / {
        proxy_pass http://innova_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeout para WebSocket
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ===== API BACKEND (Node.js tRPC) =====
    # Rotear /api/* para porta 3002
    location /api/ {
        proxy_pass http://innova_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeout para requisições longas
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ===== tRPC (JSON-RPC) =====
    # Rotear /trpc/* para porta 3002
    location /trpc/ {
        proxy_pass http://innova_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeout para requisições longas
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ===== WebSocket (Real-time) =====
    location /ws {
        proxy_pass http://innova_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout para WebSocket
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ===== Arquivos Estáticos =====
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://innova_web;
        proxy_cache_valid 200 30d;
        proxy_cache_bypass $http_pragma $http_authorization;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ===== Health Check =====
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
